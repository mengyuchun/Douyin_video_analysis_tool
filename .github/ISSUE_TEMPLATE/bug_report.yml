name: Bug Report
description: 报告一个问题 / Report a bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写以下信息，方便我们快速定位问题。

  - type: input
    id: python-version
    attributes:
      label: Python 版本
      placeholder: "3.10.19"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "Windows 11 / macOS 14 / Ubuntu 22.04"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 请详细描述你遇到的问题
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 运行 python main.py
        2. 选择功能 X
        3. 出现错误...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      render: shell

  - type: textarea
    id: config
    attributes:
      label: config.json 配置（脱敏）
      placeholder: "请删除 api_key 等敏感信息后再粘贴"
      render: json
