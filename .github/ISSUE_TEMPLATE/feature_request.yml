name: Feature Request
description: 提出新功能建议 / Suggest a new feature
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述清楚需求和使用场景。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      placeholder: 描述你遇到的问题或希望改进的场景
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      placeholder: 描述你希望的功能
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他替代方案
      placeholder: 是否考虑过其他方式实现？

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      placeholder: 截图、参考链接等
